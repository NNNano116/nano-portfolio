<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- 파비콘: J·Y 글라스 원형 (페이지 글라스 패널과 동일 톤) -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="mask-icon" href="/favicon.svg" color="#4a86de" />

    <!-- 페이지명 · 기본 메타 -->
    <title>J·Young portfolio</title>
    <meta
      name="description"
      content="안녕하세요, 4년차 백엔드 개발자 김준영입니다. 잘부탁드립니다."
    />
    <meta name="author" content="김준영 (J·Young)" />
    <meta name="keywords" content="김준영, J·Young, 백엔드 개발자, 포트폴리오, Backend, Portfolio, PHP, NestJS, React" />

    <!-- 테마 컬러: 라이트=글라스 블루, 다크=히어로 네이비 -->
    <meta name="theme-color" content="#e9eff7" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0d181f" media="(prefers-color-scheme: dark)" />
    <meta name="color-scheme" content="light dark" />

    <!-- Open Graph (카카오톡·페이스북·슬랙 등 링크 미리보기) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="J·Young portfolio" />
    <meta property="og:title" content="J·Young portfolio" />
    <meta
      property="og:description"
      content="안녕하세요, 4년차 백엔드 개발자 김준영입니다. 잘부탁드립니다."
    />
    <meta property="og:url" content="https://nnnano116.github.io/nano-portfolio/" />
    <meta property="og:image" content="https://nnnano116.github.io/nano-portfolio/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:alt" content="J·Young portfolio — 4년차 백엔드 개발자 김준영" />
    <meta property="og:locale" content="ko_KR" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="J·Young portfolio" />
    <meta
      name="twitter:description"
      content="안녕하세요, 4년차 백엔드 개발자 김준영입니다. 잘부탁드립니다."
    />
    <meta name="twitter:image" content="https://nnnano116.github.io/nano-portfolio/og-image.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
